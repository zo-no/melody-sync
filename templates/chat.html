<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#e7edf0" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1c2329" media="(prefers-color-scheme: dark)">
<meta name="remotelab-build" content="{{BUILD_TITLE}}">
{{PAGE_HEAD_TAGS}}
<link rel="manifest" href="/manifest.json?v={{ASSET_VERSION}}">
<link rel="icon" href="/favicon.ico?v={{ASSET_VERSION}}" sizes="any">
<link rel="icon" href="/icon.svg?v={{ASSET_VERSION}}" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png?v={{ASSET_VERSION}}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap">
<title>{{PAGE_TITLE}}</title>
<link rel="stylesheet" href="/chat/chat.css?v={{ASSET_VERSION}}">
</head>
<body class="{{BODY_CLASS}}">
<div class="app-shell">

<!-- Header -->
<div class="header">
  <button class="header-btn" id="menuBtn" title="Tasks" aria-label="Tasks" data-i18n-title="nav.sessions" data-i18n-aria-label="nav.sessions" data-icon="menu">&#9776;</button>
  <h1 id="headerTitle" data-i18n="app.chatTitle">MelodySync</h1>
  <button class="header-refresh-btn" id="refreshFrontendBtn" type="button" title="Reload latest frontend" aria-label="Reload latest frontend" data-i18n-title="action.reloadFrontend" data-i18n-aria-label="action.reloadFrontend" data-icon="refresh" hidden></button>
  <button class="header-task-map-btn" id="taskMapDrawerBtn" type="button" aria-label="任务地图" title="任务地图" hidden>地图</button>
  <button class="header-commit-tree-btn" id="commitTreeBtn" type="button" aria-label="会话树" title="会话树" hidden>树</button>
  <button class="header-timeline-btn" id="timelineBtn" type="button" aria-label="任务时间线" title="任务时间线" hidden>轴</button>
  <span class="status-dot" id="statusDot"></span>
  <span id="statusText" data-i18n="status.disconnected">disconnected</span>
</div>

<div class="app-container">
  <!-- Sidebar overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>MelodySync</h2>
        <button class="header-btn" id="hooksSettingsBtn" type="button" title="Hooks 设置" aria-label="Hooks 设置">⚙</button>
        <button class="header-btn" id="closeSidebar" title="Close sidebar" aria-label="Close sidebar" data-i18n-title="action.close" data-i18n-aria-label="action.close" data-icon="close">&#x2715;</button>
      </div>
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" id="tabSessions" data-i18n="nav.sessions">Tasks</button>
      </div>
      <div class="sidebar-list" id="sessionList"></div>
      <div class="session-list-footer" id="sessionListFooter" title="Build {{BUILD_TITLE}}" data-i18n-build-label="{{BUILD_LABEL}}">Build {{BUILD_LABEL}}</div>
      <div class="session-list-actions">
        <button class="new-session-btn secondary" id="sortSessionListBtn" type="button" data-i18n="sidebar.sortList">整理任务</button>
        <button class="new-session-btn" id="newSessionBtn" data-i18n="sidebar.newSession">开始任务</button>
      </div>
    </aside>
  </div>

  <!-- Hooks settings overlay -->
  <div class="hooks-overlay" id="hooksOverlay" hidden role="dialog" aria-modal="true" aria-label="Hooks 设置">
    <div class="hooks-panel">
      <div class="hooks-panel-header">
        <span class="hooks-panel-title">Hooks 设置</span>
        <button class="hooks-panel-close" id="hooksOverlayClose" type="button" aria-label="关闭">✕</button>
      </div>
      <div class="hooks-panel-body" id="hooksPanelBody">
        <div class="hooks-loading">加载中…</div>
      </div>
    </div>
  </div>

  <!-- Chat area -->
  <main class="chat-area">
    <div class="task-manager-body">
      <aside class="task-map-rail" id="taskMapRail" hidden>
        <div class="quest-task-list" id="questTaskList" hidden></div>
      </aside>

      <section class="task-manager-main-column">
      <section class="quest-tracker" id="questTracker" hidden>
        <div class="quest-tracker-main">
          <div class="quest-tracker-title" id="questTrackerTitle" hidden></div>
            <div class="quest-tracker-branch" id="questTrackerBranch" hidden>
              <div class="quest-tracker-branch-label" id="questTrackerBranchLabel">任务详情</div>
              <div class="quest-tracker-branch-title" id="questTrackerBranchTitle"></div>
            </div>
            <div class="quest-tracker-next" id="questTrackerNext" hidden></div>
            <div class="quest-tracker-time" id="questTrackerTime" hidden></div>
            <div class="quest-tracker-detail" id="questTrackerDetail" hidden>
              <div class="quest-tracker-detail-row" id="questTrackerGoalRow" hidden>
                <span class="quest-tracker-detail-label">目标</span>
                <span class="quest-tracker-detail-value" id="questTrackerGoalVal"></span>
              </div>
              <div class="quest-tracker-detail-row" id="questTrackerConclusionsRow" hidden>
                <span class="quest-tracker-detail-label">结论</span>
                <div class="quest-tracker-detail-list" id="questTrackerConclusionsList"></div>
              </div>
              <div class="quest-tracker-detail-row" id="questTrackerMemoryRow" hidden>
                <span class="quest-tracker-detail-label">记忆</span>
                <div class="quest-tracker-detail-list" id="questTrackerMemoryList"></div>
              </div>
            </div>
          </div>
          <div class="quest-tracker-footer" id="questTrackerFooter">
            <div class="quest-tracker-status" id="questTrackerStatus" hidden>
              <span class="quest-tracker-status-dot" id="questTrackerStatusDot"></span>
              <span class="quest-tracker-status-text" id="questTrackerStatusText"></span>
            </div>
            <div class="quest-tracker-actions" id="questTrackerActions">
              <button class="quest-tracker-detail-toggle" id="questTrackerDetailToggle" type="button" hidden>详情 ▸</button>
              <button class="quest-tracker-toggle" id="questTrackerToggleBtn" type="button" hidden>子任务</button>
              <button class="quest-tracker-btn" id="questTrackerCloseBtn" type="button" hidden>结束子任务</button>
              <button class="quest-tracker-btn quest-tracker-btn-secondary" id="questTrackerAltBtn" type="button" hidden>完成但不回主线</button>
              <button class="quest-tracker-btn quest-tracker-btn-secondary" id="questTrackerBackBtn" type="button" hidden>完成当前任务</button>
            </div>
          </div>
        </section>

        <div class="messages" id="messages">
          <div class="messages-inner" id="messagesInner">
            <div class="empty-state" id="emptyState">
              <h2 data-i18n="emptyState.title"></h2>
            </div>
          </div>
        </div>

        <div class="queued-panel" id="queuedPanel"></div>

        <!-- Input area -->
        <div class="input-area" id="inputArea">
          <div class="input-resize-handle" id="inputResizeHandle">
            <div class="input-resize-pill"></div>
          </div>
          <!-- Suggested questions — rendered from taskCard.candidateBranches -->
          <div class="suggested-questions" id="suggestedQuestions" hidden></div>
          <div class="input-wrapper">
            <!-- Attachment preview inside wrapper -->
            <div class="img-preview-strip" id="imgPreviewStrip" hidden></div>
            <div class="input-config-row" hidden>
              <div class="input-config-group left">
                <select class="tool-select" id="inlineToolSelect" disabled></select>
                <select class="model-select" id="inlineModelSelect" disabled></select>
                <button class="thinking-toggle" id="thinkingToggle" disabled data-i18n="tooling.thinking">Thinking</button>
                <select class="effort-select" id="effortSelect" disabled style="display:none"></select>
                <button class="img-btn" id="imgBtn" disabled title="Attach files" aria-label="Attach files" data-i18n-title="action.attachFiles" data-i18n-aria-label="action.attachFiles" data-icon="attach">&#128247;</button>
              </div>
              <div class="input-config-group right">
                <span id="contextTokens" style="display:none"></span>
              </div>
            </div>
            <div class="input-row">
              <input type="file" id="imgFileInput" accept="*/*" multiple hidden>
              <textarea id="msgInput" placeholder="Message..." data-i18n-placeholder="input.placeholder.message" disabled></textarea>
              <button class="send-btn" id="sendBtn" disabled title="Send" aria-label="Send" data-i18n-title="action.send" data-i18n-aria-label="action.send" data-icon="send">&#9654;</button>
              <button class="cancel-btn" id="cancelBtn" title="Stop" aria-label="Stop" data-i18n-title="action.stop" data-i18n-aria-label="action.stop" data-icon="debug-stop" style="display:none">&#9632;</button>
            </div>
            <div class="composer-pending-state" id="composerPendingState" aria-live="polite"></div>
          </div>
          <div class="input-footer">
            <a href="https://github.com/zo-no/melody-sync" target="_blank" rel="noreferrer noopener" data-i18n="footer.openSource">Open source on GitHub ↗</a>
            <span class="input-footer-tagline" data-i18n="footer.tagline">Built with AI &amp; ❤️</span>
          </div>
        </div>
      </section>
    </div>
  </main>

</div>

<button class="task-map-drawer-backdrop" id="taskMapDrawerBackdrop" hidden aria-label="关闭任务地图"></button>
<aside class="commit-tree-rail" id="commitTreeRail" hidden aria-label="会话树" aria-hidden="true">
  <div class="commit-tree-header">
    <span class="commit-tree-title">会话树</span>
    <button class="commit-tree-close-btn" id="commitTreeCloseBtn" type="button" aria-label="关闭会话树">✕</button>
  </div>
  <div class="commit-tree-inner" id="commitTreeInner"></div>
</aside>
<button class="commit-tree-backdrop" id="commitTreeBackdrop" hidden aria-label="关闭会话树"></button>
</div>
<div class="timeline-overlay" id="timelineOverlay" hidden>
  <div class="timeline-header">
    <span class="timeline-session-goal" id="timelineSessionGoal"></span>
    <span class="timeline-title">任务时间线</span>
    <button class="timeline-close-btn" id="timelineCloseBtn" type="button" aria-label="关闭">✕</button>
  </div>
  <div class="timeline-body" id="timelineBody"></div>
</div>
<div class="gesture-pill" id="gesturePill" aria-hidden="true"></div>

{{BOOTSTRAP_SCRIPT_TAGS}}
{{EXTRA_BOOTSTRAP_SCRIPTS}}
<script src="/marked.min.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/i18n.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/session-state-model.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/icons.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/bootstrap.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/bootstrap-session-catalog.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/session-http-helpers.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/session-http-list-state.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/session-http.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/layout-tooling.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/tooling.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/realtime.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/realtime-render.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/ui.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/session-surface-ui.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/session-list-ui.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/sidebar-ui.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/task-map-model.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/vendor/panzoom.min.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/workbench-ui.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/compose.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/gestures.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/hooks-ui.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
<script src="/chat/init.js?v={{ASSET_VERSION}}" nonce="{{NONCE}}"></script>
</body>
</html>
